<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shiphit Chatbot</title>
  <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" class="bot-icon-msg">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- CHAT WIDGET -->
  <div class="chat-widget" id="chatWidget">

    <!-- HEADER -->
    <div class="chat-header">
      <div class="header-left">
        <span>Shiphit Support</span>
      </div>

      <button id="closeChat">✖</button>
    </div>

    <!-- CHAT BODY -->
    <div id="chatBox" class="chat-body"></div>

    <!-- INPUT AREA -->
    <div class="chat-footer">
      <input id="userInput" type="text" placeholder="Ask about shipping, tracking.." />
      <button id="sendBtn">➤</button>
    </div>
    

  </div>

  <!-- OPEN BUTTON -->
  <button id="openChat" class="open-chat-btn">🤖</button>

  <!-- SCRIPTS -->
  <script src="data.js"></script>
  <script src="script.js"></script>

</body>
</html>
